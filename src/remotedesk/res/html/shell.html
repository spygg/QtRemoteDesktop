<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程桌面 - Shell</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            min-height: 100vh;
            position: relative;
        }
        #toolbar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: #222;
            border-bottom: 1px solid #333;
            gap: 12px;
        }
        #toolbar .title { font-size: 14px; color: #aaa; }
        #toolbar .badge { font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        #toolbar .badge.interactive { background: #2a6; color: #fff; }
        #toolbar .badge.oneshot { background: #666; color: #fff; }
        #toolbar a {
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
        }
        #toolbar a:hover { text-decoration: underline; }
        #output {
            position: absolute;
            top: 42px;
            bottom: 52px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            background: #111;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        #output .stdout { color: #ccc; }
        #output .stderr { color: #f55; }
        #output .error { color: #f55; font-weight: bold; }
        #output .info { color: #888; }
        #prompt-line {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: #222;
            border-top: 1px solid #333;
            gap: 8px;
        }
        #prompt-label { color: #4a9eff; font-size: 13px; user-select: none; white-space: pre; }
        #cmd-input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 12px;
            color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            outline: none;
        }
        #cmd-input:focus { border-color: #4a9eff; }
        #cmd-input.hidden { display: none; }
        #terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: transparent;
            caret-color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            outline: none;
            position: absolute;
            left: -9999px;
        }
        #prompt-line button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        #btn-exec { background: #4a9eff; color: #fff; }
        #btn-exec:hover { background: #3a8eef; }
        #btn-clear { background: #444; color: #ccc; }
        #btn-clear:hover { background: #555; }
        #btn-exec:disabled { opacity: 0.5; cursor: default; }
        #cursor {
            display: inline;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">🔧 远程 Shell</span>
        <span id="mode-badge" class="badge oneshot">one-shot</span>
        <a href="/" target="_blank">← 返回桌面</a>
    </div>
    <div id="output">
        <div class="info">正在连接...</div>
    </div>
    <div id="prompt-line">
        <span id="prompt-label">$</span>
        <input type="text" id="cmd-input" placeholder="输入命令..." autocomplete="off" />
        <button id="btn-exec" onclick="execCmd()">执行</button>
        <button id="btn-clear" onclick="clearOutput()">清屏</button>
    </div>
    <script>
        let history = [];
        let historyIdx = -1;
        let running = false;
        let cwd = '';
        let mode = 'oneshot';
        let ws = null;
        let inputBuffer = '';
        let termBuf = '';
        let interactiveCmdBuf = '';
        let localEchoEnabled = false;

        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const btnExec = document.getElementById('btn-exec');
        const btnClear = document.getElementById('btn-clear');
        const promptLabel = document.getElementById('prompt-label');
        const modeBadge = document.getElementById('mode-badge');

        function stripAnsi(str) {
            // 去除 ANSI CSI (色彩/光标) + OSC (标题) + 其他 \x1B 序列
            return str.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '')
                      .replace(/\x1B\].*?(?:\x07|\x1B\\)/g, '')
                      .replace(/\x1B./g, '');
        }

        function appendOutput(text, className) {
            const div = document.createElement('div');
            div.className = className || 'stdout';
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function appendOutputRaw(text) {
            const span = document.createElement('span');
            span.className = 'stdout';
            span.textContent = text;
            output.appendChild(span);
            output.scrollTop = output.scrollHeight;
        }

        function safeBackspace() {
            const n = termBuf.lastIndexOf('\n');
            if (n >= 0 && termBuf.length <= n + 1)
                return false;
            if (termBuf.length > 0) {
                termBuf = termBuf.slice(0, -1);
                return true;
            }
            return false;
        }

        function clearOutput() {
            output.innerHTML = '';
            termBuf = '';
            if (mode === 'interactive' && ws && ws.readyState === WebSocket.OPEN)
                wsSend('\n');
        }

        function updatePrompt(newCwd) {
            if (newCwd) cwd = newCwd;
            promptLabel.textContent = cwd ? cwd + ' $' : '$';
        }

        // Interactive mode
        function startInteractive() {
            mode = 'interactive';
            modeBadge.textContent = 'interactive';
            modeBadge.className = 'badge interactive';
            output.innerHTML = '';
            interactiveCmdBuf = '';
            appendOutput('交互式 Shell (PTY) — 支持 su/ssh/top 等命令\r\n', 'info');

            input.style.display = 'none';
            btnExec.style.display = 'none';

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('compositionend', (e) => {
                if (e.data && e.data.length > 0) {
                    for (const ch of e.data)
                        wsSend(ch);
                    if (localEchoEnabled) {
                        termBuf += e.data;
                        output.textContent = termBuf;
                    }
                }
            });
        }

        function onKeyDown(e) {
            if (e.isComposing) return;
            if (e.ctrlKey || e.altKey || e.metaKey) {
                if (e.ctrlKey && e.key === 'c') {
                    e.preventDefault();
                    wsSend('\x03');
                    return;
                }
                if (e.ctrlKey && e.key === 'd') {
                    e.preventDefault();
                    wsSend('\x04');
                    return;
                }
                if (e.ctrlKey && e.key === 'l') {
                    e.preventDefault();
                    wsSend('\x0c');
                    clearOutput();
                    return;
                }
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    wsSend('\x1a');
                    return;
                }
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                wsSend('\n');
                if (localEchoEnabled)
                    termBuf += '\n';
                // 输入 cls/clear 时同时清屏（从缓冲区或 termBuf 最后一行检测）
                const cmd1 = interactiveCmdBuf.trim().toLowerCase();
                let cmd2 = '';
                if (localEchoEnabled) {
                    const lines = termBuf.split('\n');
                    if (lines.length >= 2)
                        cmd2 = lines[lines.length - 2].trim().toLowerCase();
                }
                if (cmd1 === 'cls' || cmd1 === 'clear' || cmd2 === 'cls' || cmd2 === 'clear')
                    clearOutput();
                interactiveCmdBuf = '';
                return;
            }

            if (e.key === 'Backspace') {
                e.preventDefault();
                interactiveCmdBuf = interactiveCmdBuf.slice(0, -1);
                wsSend('\x7f');
                if (localEchoEnabled && safeBackspace())
                    output.textContent = termBuf;
                return;
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                wsSend('\t');
                if (localEchoEnabled)
                    termBuf += '\t';
                return;
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                wsSend('\x1b[A');
                return;
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                wsSend('\x1b[B');
                return;
            }

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                wsSend('\x1b[C');
                return;
            }

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                wsSend('\x1b[D');
                return;
            }

            if (e.key.length === 1) {
                e.preventDefault();
                interactiveCmdBuf += e.key;
                wsSend(e.key);
                if (localEchoEnabled) {
                    termBuf += e.key;
                    output.textContent = termBuf;
                    output.scrollTop = output.scrollHeight;
                }
            }
        }

        function strToBase64(str) {
            // 将 Unicode 字符串编码为 UTF-8 字节，再 base64
            let binary = '';
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (code < 0x80) {
                    binary += String.fromCharCode(code);
                } else if (code < 0x800) {
                    binary += String.fromCharCode(0xC0 | (code >> 6));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                } else if (code < 0xD800 || code > 0xDBFF) {
                    binary += String.fromCharCode(0xE0 | (code >> 12));
                    binary += String.fromCharCode(0x80 | ((code >> 6) & 0x3F));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                } else {
                    i++;
                    code = 0x10000 + ((code - 0xD800) << 10) + (str.charCodeAt(i) - 0xDC00);
                    binary += String.fromCharCode(0xF0 | (code >> 18));
                    binary += String.fromCharCode(0x80 | ((code >> 12) & 0x3F));
                    binary += String.fromCharCode(0x80 | ((code >> 6) & 0x3F));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                }
            }
            return btoa(binary);
        }

        function wsSend(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = JSON.stringify({
                    type: 'input',
                    data: strToBase64(data)
                });
                ws.send(msg);
            }
        }

        function wsSendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const cols = Math.floor(output.clientWidth / 9);
                const rows = Math.floor(output.clientHeight / 18);
                if (cols > 0 && rows > 0) {
                    const msg = JSON.stringify({
                        type: 'resize',
                        cols: Math.max(cols, 40),
                        rows: Math.max(rows, 10)
                    });
                    ws.send(msg);
                }
            }
        }

        function tryConnectWS() {
            const loc = window.location;
            const httpPort = parseInt(loc.port) || (loc.protocol === 'https:' ? 443 : 80);
            const wsPort = httpPort + 1;
            const proto = loc.protocol === 'https:' ? 'wss://' : 'ws://';
            const url = proto + loc.hostname + ':' + wsPort + '/api/shell/ws';

            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = function() {
                startInteractive();
                setTimeout(wsSendResize, 200);
            };

            ws.onmessage = function(e) {
                if (typeof e.data === 'string') {
                    // 检查配置消息
                    if (e.data.startsWith('{')) {
                        try {
                            const cfg = JSON.parse(e.data);
                            if (cfg.type === 'config' && cfg.localEcho !== undefined) {
                                localEchoEnabled = cfg.localEcho;
                                return;
                            }
                        } catch(_) {}
                    }
                    const text = stripAnsi(e.data);
                    for (const ch of text) {
                        if (ch === '\b') {
                            safeBackspace();
                        } else if (ch === '\r') {
                            // ignore CR (part of CRLF)
                        } else if (ch === '\n') {
                            termBuf += '\n';
                        } else if (ch >= ' ') {
                            termBuf += ch;
                        }
                    }
                    output.textContent = termBuf;
                    output.scrollTop = output.scrollHeight;
                }
            };

            ws.onclose = function() {
                if (mode === 'interactive') {
                    appendOutput('\r\n--- 连接已关闭 ---', 'error');
                }
                ws = null;
            };

            ws.onerror = function() {
                // WS not available, fall through to one-shot mode
                ws = null;
            };

            // Timeout: if WS not connected within 2s, fall back to one-shot
            setTimeout(function() {
                if (mode !== 'interactive') {
                    if (ws) {
                        ws.onclose = null;
                        ws.close();
                        ws = null;
                    }
                    startOneShot();
                }
            }, 2000);
        }

        // One-shot mode (fallback)
        function startOneShot() {
            mode = 'oneshot';
            modeBadge.textContent = 'one-shot';
            modeBadge.className = 'badge oneshot';
            output.innerHTML = '';
            appendOutput('交互式 Shell 不可用，使用 one-shot 模式（不支持 su/ssh/top 等交互命令）', 'info');

            input.style.display = '';
            btnExec.style.display = '';
        }

        async function execCmd() {
            const cmd = input.value.trim();
            if (!cmd || running) return;

            // cls/clear 时同时清屏
            const lower = cmd.toLowerCase();
            if (lower === 'cls' || lower === 'clear')
                return clearOutput();

            running = true;
            btnExec.disabled = true;
            btnExec.textContent = '执行中...';

            appendOutput((cwd ? cwd + ' ' : '') + '$ ' + cmd, 'stdout');
            history.push(cmd);
            historyIdx = history.length;
            input.value = '';

            try {
                const resp = await fetch('/api/shell/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const result = await resp.json();
                if (result.cwd) updatePrompt(result.cwd);
                if (result.success) {
                    if (result.stdout) appendOutput(result.stdout, 'stdout');
                    if (result.stderr) appendOutput(result.stderr, 'stderr');
                    if (result.stdout || result.stderr)
                        appendOutput('exit: ' + result.exitCode, 'info');
                } else {
                    appendOutput('错误: ' + (result.error || '执行失败'), 'error');
                }
            } catch (e) {
                appendOutput('网络错误: ' + e.message, 'error');
            } finally {
                running = false;
                btnExec.disabled = false;
                btnExec.textContent = '执行';
                input.focus();
            }
        }

        input.addEventListener('keydown', function(e) {
            if (e.isComposing) return;
            if (e.key === 'Enter') {
                execCmd();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    input.value = history[historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx < history.length - 1) {
                    historyIdx++;
                    input.value = history[historyIdx];
                } else {
                    historyIdx = history.length;
                    input.value = '';
                }
            }
        });

        window.addEventListener('resize', function() {
            if (mode === 'interactive' && ws) {
                wsSendResize();
            }
        });

        // Init
        fetch('/api/shell/cwd').then(function(r) { return r.json(); }).then(function(d) {
            if (d.cwd) updatePrompt(d.cwd);
        }).catch(function(){});

        tryConnectWS();
        input.focus();
    </script>
</body>
</html>

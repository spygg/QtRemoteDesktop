<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程桌面 - Shell</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #toolbar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: #222;
            border-bottom: 1px solid #333;
            gap: 12px;
        }
        #toolbar .title { font-size: 14px; color: #aaa; }
        #toolbar a {
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
        }
        #toolbar a:hover { text-decoration: underline; }
        #output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            background: #111;
        }
        #output .prompt { color: #4a9eff; }
        #output .stdout { color: #ccc; }
        #output .stderr { color: #f55; }
        #output .error { color: #f55; font-weight: bold; }
        #output .info { color: #888; }
        #input-bar {
            display: flex;
            padding: 8px 16px;
            background: #222;
            border-top: 1px solid #333;
            gap: 8px;
            align-items: center;
        }
        #input-bar .prompt-label { color: #4a9eff; font-size: 13px; user-select: none; }
        #input-bar input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 12px;
            color: #eee;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            outline: none;
        }
        #input-bar input:focus { border-color: #4a9eff; }
        #input-bar button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        #btn-exec { background: #4a9eff; color: #fff; }
        #btn-exec:hover { background: #3a8eef; }
        #btn-clear { background: #444; color: #ccc; }
        #btn-clear:hover { background: #555; }
        #btn-exec:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">🔧 远程 Shell</span>
        <a href="/" target="_blank">← 返回桌面</a>
    </div>
    <div id="output">
        <div class="info">输入命令后按 Enter 或点击"执行"。支持管道、重定向等 shell 特性。</div>
    </div>
    <div id="input-bar">
        <span class="prompt-label">$</span>
        <input type="text" id="cmd-input" placeholder="输入命令..." autocomplete="off" />
        <button id="btn-exec" onclick="execCmd()">执行</button>
        <button id="btn-clear" onclick="clearOutput()">清屏</button>
    </div>
    <script>
        let history = [];
        let historyIdx = -1;
        let running = false;

        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const btnExec = document.getElementById('btn-exec');

        function appendOutput(text, className) {
            const div = document.createElement('div');
            div.className = className || 'stdout';
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            output.innerHTML = '';
        }

        async function execCmd() {
            const cmd = input.value.trim();
            if (!cmd || running) return;

            running = true;
            btnExec.disabled = true;
            btnExec.textContent = '执行中...';

            appendOutput('$ ' + cmd, 'prompt');
            history.push(cmd);
            historyIdx = history.length;
            input.value = '';

            try {
                const resp = await fetch('/api/shell/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const result = await resp.json();
                if (result.success) {
                    if (result.stdout) appendOutput(result.stdout, 'stdout');
                    if (result.stderr) appendOutput(result.stderr, 'stderr');
                    if (result.stdout || result.stderr)
                        appendOutput('exit: ' + result.exitCode, 'info');
                    else
                        appendOutput('(命令完成，exit: ' + result.exitCode + ')', 'info');
                } else {
                    appendOutput('错误: ' + (result.error || '执行失败'), 'error');
                }
            } catch (e) {
                appendOutput('网络错误: ' + e.message, 'error');
            } finally {
                running = false;
                btnExec.disabled = false;
                btnExec.textContent = '执行';
                input.focus();
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                execCmd();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    input.value = history[historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx < history.length - 1) {
                    historyIdx++;
                    input.value = history[historyIdx];
                } else {
                    historyIdx = history.length;
                    input.value = '';
                }
            }
        });

        input.focus();
    </script>
</body>
</html>

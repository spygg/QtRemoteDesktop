<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程桌面 - Shell</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #eee; font-family: 'Consolas', 'Courier New', monospace; min-height: 100vh; position: relative; }

        /* 工具栏 */
        #toolbar { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(0); display: flex; flex-wrap: nowrap; justify-content: center; gap: 2px; z-index: 4000; background: rgba(30,30,30,0.92); border-radius: 0 0 10px 10px; padding: 6px 10px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 12px rgba(0,0,0,0.4); backdrop-filter: blur(8px); max-width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #toolbar.hidden { transform: translateX(-50%) translateY(-100%); }
        #toolbar-trigger { position: fixed; top: 0; left: 0; right: 0; height: 6px; z-index: 3999; }
        #btn-pin { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
        #btn-pin:hover { color: #fff; }
        #btn-pin.pinned { color: #4a9eff; }
        .btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #eee; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px; text-decoration: none; }
        @media (max-width: 600px) { #toolbar { padding: 4px 6px; gap: 1px; } .btn { padding: 4px 8px; font-size: 11px; } .btn .shortcut, .btn .btn-text { display: none; } #btn-pin { font-size: 12px; padding: 1px 4px; } }
        .btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .btn.active { background: rgba(0,102,204,0.6); border-color: rgba(0,102,204,0.8); }
        .btn .shortcut { font-size: 10px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; font-family: monospace; }

        /* 配置下拉菜单 */
        #config-dropdown { display: none; position: fixed; top: 44px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.97); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 18px; z-index: 1001; box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(12px); gap: 12px; flex-direction: column; min-width: 320px; }
        #config-dropdown.open { display: flex; }
        .dropdown-section { display: flex; flex-direction: column; gap: 6px; }
        .dropdown-title { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .dropdown-note { color: #666; font-size: 10px; margin-top: -4px; }
        .dropdown-options { display: flex; gap: 4px; flex-wrap: wrap; }
        .dropdown-options button { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: all 0.12s; }
        .dropdown-options button:hover { background: rgba(255,255,255,0.14); color: #fff; }
        .dropdown-options button.active { background: rgba(0,102,204,0.5); border-color: #4a9eff; color: #fff; }
        .dropdown-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; }
        .dropdown-overlay.open { display: block; top: 44px; }

        /* Shell badge */
        #toolbar-title { color: #aaa; font-size: 13px; margin-right: 4px; white-space: nowrap; }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
        .badge.interactive { background: #2a6; color: #fff; }
        .badge.oneshot { background: #666; color: #fff; }

        /* Shell output */
        #output { position: absolute; top: 44px; bottom: 52px; left: 0; right: 0; overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; background: #111; font-family: 'Consolas', 'Courier New', monospace; }
        #output .stdout { color: #ccc; }
        #output .stderr { color: #f55; }
        #output .error { color: #f55; font-weight: bold; }
        #output .info { color: #888; }

        /* Prompt line */
        #prompt-line { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; padding: 8px 16px; background: #222; border-top: 1px solid #333; gap: 8px; }
        #prompt-label { color: #4a9eff; font-size: 13px; user-select: none; white-space: pre; }
        #cmd-input { flex: 1; background: #111; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; color: #eee; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; outline: none; }
        #cmd-input:focus { border-color: #4a9eff; }
        #cmd-input.hidden { display: none; }
        #terminal-input { flex: 1; background: transparent; border: none; color: transparent; caret-color: #eee; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; outline: none; position: absolute; left: -9999px; }
        #prompt-line button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        #btn-exec { background: #4a9eff; color: #fff; }
        #btn-exec:hover { background: #3a8eef; }
        #btn-clear { background: #444; color: #ccc; }
        #btn-clear:hover { background: #555; }
        #btn-exec:disabled { opacity: 0.5; cursor: default; }
        #cursor { display: inline; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="toolbar-trigger"></div>
    <div id="toolbar">
        <button id="btn-pin" title="固定工具栏">📌</button>
        <span id="toolbar-title">🔧 远程 Shell</span>
        <span id="mode-badge" class="badge oneshot">one-shot</span>
        <button class="btn" id="btn-quality" onclick="toggleConfigDropdown()">
            <span class="btn-icon">🎨</span>
            <span class="btn-text">画质: 中</span>
        </button>
        <button class="btn" id="btn-files" onclick="toggleFilePanel()"><span class="btn-icon">📁</span><span class="btn-text">文件</span></button>
        <button class="btn" id="btn-users" onclick="window.open('/admin/users','_blank')"><span class="btn-icon">👤</span><span class="btn-text">用户</span></button>
        <a class="btn" id="btn-desktop" href="/"><span class="btn-icon">←</span><span class="btn-text">桌面</span></a>
        <button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()">
            <span class="btn-icon">⛶</span>
            <span class="btn-text">全屏</span>
            <span class="shortcut">F11</span>
        </button>
    </div>

    <div id="config-overlay" class="dropdown-overlay" onclick="toggleConfigDropdown()"></div>
    <div id="config-dropdown">
        <div class="dropdown-section">
            <div class="dropdown-title">画质</div>
            <div class="dropdown-options" data-key="quality">
                <button data-value="high">高</button>
                <button data-value="medium">中</button>
                <button data-value="low">低</button>
                <button data-value="verylow">极低</button>
            </div>
        </div>
        <div class="dropdown-section">
            <div class="dropdown-title">帧率 (FPS)</div>
            <div class="dropdown-options" data-key="fps">
                <button data-value="60">60</button>
                <button data-value="30">30</button>
                <button data-value="15">15</button>
            </div>
        </div>
        <div class="dropdown-section">
            <div class="dropdown-title">缩放</div>
            <div class="dropdown-options" data-key="scale">
                <button data-value="100">100%</button>
                <button data-value="75">75%</button>
                <button data-value="50">50%</button>
                <button data-value="25">25%</button>
            </div>
        </div>
        <div class="dropdown-section">
            <div class="dropdown-title">远端缩放</div>
            <div class="dropdown-note">按物理分辨率等比例缩放，非实际改变设备分辨率</div>
            <div class="dropdown-options" id="resolution-options" data-key="resolution"></div>
        </div>
    </div>

    <div id="output">
        <div class="info">正在连接...</div>
    </div>

    <div id="prompt-line">
        <span id="prompt-label">$</span>
        <input type="text" id="cmd-input" placeholder="输入命令..." autocomplete="off" />
        <button id="btn-exec" onclick="execCmd()">执行</button>
        <button id="btn-clear" onclick="clearOutput()">清屏</button>
    </div>

    <script>
        // ==================== 工具栏 ====================
        const QUALITY_MAP = { high: '高', medium: '中', low: '低', verylow: '极低' };
        const FPS_VALUES = [60, 30, 15];
        const SCALE_VALUES = [100, 75, 50, 25];

        const state = {
            ws: null,
            screenWidth: 0,
            screenHeight: 0,
            resolutions: [],
            currentConfig: { quality: 'medium', fps: 30, scale: 75, resolution: '' },
        };

        function toggleConfigDropdown() {
            const dd = document.getElementById('config-dropdown');
            const ov = document.getElementById('config-overlay');
            const open = !dd.classList.contains('open');
            dd.classList.toggle('open', open);
            ov.classList.toggle('open', open);
        }

        function updateDropdownActive() {
            const cfg = state.currentConfig;
            document.querySelectorAll('#config-dropdown .dropdown-options').forEach(function(group) {
                const key = group.dataset.key;
                if (!key) return;
                const val = String(cfg[key]);
                group.querySelectorAll('button').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.value === val);
                });
            });
        }

        function updateQualityLabel() {
            const label = QUALITY_MAP[state.currentConfig.quality] || '中';
            document.getElementById('btn-quality').querySelector('.btn-text').textContent = '画质: ' + label;
        }

        function onDropdownClick(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const group = btn.closest('.dropdown-options');
            if (!group) return;
            const key = group.dataset.key;
            const val = btn.dataset.value;

            if (key === 'quality') {
                const fps = state.currentConfig.fps;
                state.currentConfig.quality = val;
                send({ type: 'config', quality: val, fps: fps });
            } else if (key === 'fps') {
                const newFps = parseInt(val);
                const quality = state.currentConfig.quality;
                state.currentConfig.fps = newFps;
                send({ type: 'config', quality: quality, fps: newFps });
            } else if (key === 'scale') {
                const newScale = parseInt(val);
                state.currentConfig.scale = newScale;
                send({ type: 'config', scale: newScale });
                buildResolutionOptions();
            } else if (key === 'resolution') {
                const parts = val.split('x');
                const resW = parseInt(parts[0]), resH = parseInt(parts[1]);
                state.currentConfig.resolution = val;
                if (state.screenWidth > 0 && resW <= state.screenWidth) {
                    state.currentConfig.scale = 100;
                    send({ type: 'set_resolution', width: resW, height: resH });
                }
                buildResolutionOptions();
            }
            updateDropdownActive();
            updateQualityLabel();
        }

        function buildResolutionOptions() {
            const container = document.getElementById('resolution-options');
            container.innerHTML = '';
            let resolutions = state.resolutions;
            if (!resolutions || resolutions.length === 0) {
                const sw = state.screenWidth, sh = state.screenHeight;
                if (!sw || !sh) return;
                resolutions = [
                    { width: sw, height: sh },
                    { width: 1920, height: 1080 },
                    { width: 1680, height: 1050 },
                    { width: 1600, height: 900 },
                    { width: 1440, height: 900 },
                    { width: 1366, height: 768 },
                    { width: 1280, height: 720 },
                    { width: 1024, height: 768 },
                ];
            }
            const nativeRes = (state.screenWidth > 0)
                ? state.screenWidth + 'x' + state.screenHeight : '';
            for (const res of resolutions) {
                const w = res.width || res.w;
                const h = res.height || res.h;
                const resolutionStr = w + 'x' + h;
                const btn = document.createElement('button');
                btn.dataset.value = resolutionStr;
                const isNative = (resolutionStr === nativeRes);
                const scalePct = nativeRes ? Math.round(w / state.screenWidth * 100) : 100;
                btn.textContent = (isNative ? '原始 ' : '') + w + '×' + h + ' (' + scalePct + '%)';
                container.appendChild(btn);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleFilePanel() {
            window.open('/files', '_blank');
        }

        function send(data) {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send(JSON.stringify(data));
            }
        }

        document.getElementById('config-dropdown').addEventListener('click', onDropdownClick);

        // ==================== Shell ====================
        let history = [];
        let historyIdx = -1;
        let running = false;
        let cwd = '';
        let mode = 'oneshot';
        let ws = null;
        let inputBuffer = '';
        let termBuf = '';
        let interactiveCmdBuf = '';
        let localEchoEnabled = false;

        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const btnExec = document.getElementById('btn-exec');
        const btnClear = document.getElementById('btn-clear');
        const promptLabel = document.getElementById('prompt-label');
        const modeBadge = document.getElementById('mode-badge');

        function stripAnsi(str) {
            return str.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '')
                      .replace(/\x1B\].*?(?:\x07|\x1B\\)/g, '')
                      .replace(/\x1B./g, '');
        }

        function appendOutput(text, className) {
            const div = document.createElement('div');
            div.className = className || 'stdout';
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function appendOutputRaw(text) {
            const span = document.createElement('span');
            span.className = 'stdout';
            span.textContent = text;
            output.appendChild(span);
            output.scrollTop = output.scrollHeight;
        }

        function safeBackspace() {
            const n = termBuf.lastIndexOf('\n');
            if (n >= 0 && termBuf.length <= n + 1)
                return false;
            if (termBuf.length > 0) {
                termBuf = termBuf.slice(0, -1);
                return true;
            }
            return false;
        }

        function clearOutput() {
            output.innerHTML = '';
            termBuf = '';
            if (mode === 'interactive' && ws && ws.readyState === WebSocket.OPEN)
                wsSend('\n');
        }

        function updatePrompt(newCwd) {
            if (newCwd) cwd = newCwd;
            promptLabel.textContent = cwd ? cwd + ' $' : '$';
        }

        function startInteractive() {
            mode = 'interactive';
            modeBadge.textContent = 'interactive';
            modeBadge.className = 'badge interactive';
            output.innerHTML = '';
            interactiveCmdBuf = '';
            appendOutput('交互式 Shell (PTY) — 支持 su/ssh/top 等命令\r\n', 'info');

            input.style.display = 'none';
            btnExec.style.display = 'none';

            output.setAttribute('tabindex', '-1');
            output.focus();

            document.removeEventListener('keydown', onKeyDown);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('compositionend', function(e) {
                if (e.data && e.data.length > 0) {
                    for (const ch of e.data)
                        wsSend(ch);
                    if (localEchoEnabled) {
                        termBuf += e.data;
                        output.textContent = termBuf;
                    }
                }
            });
        }

        function onKeyDown(e) {
            if (e.isComposing) return;
            if (e.ctrlKey || e.altKey || e.metaKey) {
                if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.code === 'KeyC')) {
                    e.preventDefault();
                    e.stopPropagation();
                    appendOutput('^C', 'stdout');
                    wsSend('\x03');
                    return;
                }
                if (e.ctrlKey && e.key === 'd') {
                    e.preventDefault();
                    wsSend('\x04');
                    return;
                }
                if (e.ctrlKey && e.key === 'l') {
                    e.preventDefault();
                    wsSend('\x0c');
                    clearOutput();
                    return;
                }
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    wsSend('\x1a');
                    return;
                }
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                wsSend('\n');
                if (localEchoEnabled)
                    termBuf += '\n';
                const cmd1 = interactiveCmdBuf.trim().toLowerCase();
                let cmd2 = '';
                if (localEchoEnabled) {
                    const lines = termBuf.split('\n');
                    if (lines.length >= 2)
                        cmd2 = lines[lines.length - 2].trim().toLowerCase();
                }
                if (cmd1 === 'cls' || cmd1 === 'clear' || cmd2 === 'cls' || cmd2 === 'clear')
                    clearOutput();
                interactiveCmdBuf = '';
                return;
            }

            if (e.key === 'Backspace') {
                e.preventDefault();
                interactiveCmdBuf = interactiveCmdBuf.slice(0, -1);
                wsSend('\x7f');
                if (localEchoEnabled && safeBackspace())
                    output.textContent = termBuf;
                return;
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                wsSend('\t');
                if (localEchoEnabled)
                    termBuf += '\t';
                return;
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                wsSend('\x1b[A');
                return;
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                wsSend('\x1b[B');
                return;
            }

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                wsSend('\x1b[C');
                return;
            }

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                wsSend('\x1b[D');
                return;
            }

            if (e.key.length === 1) {
                e.preventDefault();
                interactiveCmdBuf += e.key;
                wsSend(e.key);
                if (localEchoEnabled) {
                    termBuf += e.key;
                    output.textContent = termBuf;
                    output.scrollTop = output.scrollHeight;
                }
            }
        }

        function strToBase64(str) {
            let binary = '';
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (code < 0x80) {
                    binary += String.fromCharCode(code);
                } else if (code < 0x800) {
                    binary += String.fromCharCode(0xC0 | (code >> 6));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                } else if (code < 0xD800 || code > 0xDBFF) {
                    binary += String.fromCharCode(0xE0 | (code >> 12));
                    binary += String.fromCharCode(0x80 | ((code >> 6) & 0x3F));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                } else {
                    i++;
                    code = 0x10000 + ((code - 0xD800) << 10) + (str.charCodeAt(i) - 0xDC00);
                    binary += String.fromCharCode(0xF0 | (code >> 18));
                    binary += String.fromCharCode(0x80 | ((code >> 12) & 0x3F));
                    binary += String.fromCharCode(0x80 | ((code >> 6) & 0x3F));
                    binary += String.fromCharCode(0x80 | (code & 0x3F));
                }
            }
            return btoa(binary);
        }

        function wsSend(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = JSON.stringify({
                    type: 'input',
                    data: strToBase64(data)
                });
                ws.send(msg);
            }
        }

        function wsSendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const cols = Math.floor(output.clientWidth / 9);
                const rows = Math.floor(output.clientHeight / 18);
                if (cols > 0 && rows > 0) {
                    const msg = JSON.stringify({
                        type: 'resize',
                        cols: Math.max(cols, 40),
                        rows: Math.max(rows, 10)
                    });
                    ws.send(msg);
                }
            }
        }

        function tryConnectWS() {
            const loc = window.location;
            const httpPort = parseInt(loc.port) || (loc.protocol === 'https:' ? 443 : 80);
            const wsPort = httpPort + 1;
            const proto = loc.protocol === 'https:' ? 'wss://' : 'ws://';
            const url = proto + loc.hostname + ':' + wsPort + '/api/shell/ws';

            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = function() {
                state.ws = ws;
                startInteractive();
                setTimeout(wsSendResize, 200);
            };

            ws.onmessage = function(e) {
                if (typeof e.data === 'string') {
                    if (e.data.startsWith('{')) {
                        try {
                            const cfg = JSON.parse(e.data);
                            if (cfg.type === 'config' && cfg.localEcho !== undefined) {
                                localEchoEnabled = cfg.localEcho;
                                return;
                            }
                        } catch(_) {}
                    }
                    const text = stripAnsi(e.data);
                    for (const ch of text) {
                        if (ch === '\b') {
                            safeBackspace();
                        } else if (ch === '\r') {
                        } else if (ch === '\n') {
                            termBuf += '\n';
                        } else if (ch >= ' ') {
                            termBuf += ch;
                        }
                    }
                    output.textContent = termBuf;
                    output.scrollTop = output.scrollHeight;
                }
            };

            ws.onclose = function() {
                state.ws = null;
                if (mode === 'interactive') {
                    appendOutput('\r\n--- 连接已关闭 ---', 'error');
                }
                ws = null;
            };

            ws.onerror = function() {
                state.ws = null;
                ws = null;
            };

            setTimeout(function() {
                if (mode !== 'interactive') {
                    if (ws) {
                        ws.onclose = null;
                        ws.close();
                        ws = null;
                    }
                    startOneShot();
                }
            }, 2000);
        }

        function startOneShot() {
            mode = 'oneshot';
            modeBadge.textContent = 'one-shot';
            modeBadge.className = 'badge oneshot';
            output.innerHTML = '';
            appendOutput('交互式 Shell 不可用，使用 one-shot 模式（不支持 su/ssh/top 等交互命令）', 'info');

            input.style.display = '';
            btnExec.style.display = '';
        }

        async function execCmd() {
            const cmd = input.value.trim();
            if (!cmd || running) return;

            const lower = cmd.toLowerCase();
            if (lower === 'cls' || lower === 'clear')
                return clearOutput();

            running = true;
            btnExec.disabled = true;
            btnExec.textContent = '执行中...';

            appendOutput((cwd ? cwd + ' ' : '') + '$ ' + cmd, 'stdout');
            history.push(cmd);
            historyIdx = history.length;
            input.value = '';

            try {
                const resp = await fetch('/api/shell/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const result = await resp.json();
                if (result.cwd) updatePrompt(result.cwd);
                if (result.success) {
                    if (result.stdout) appendOutput(result.stdout, 'stdout');
                    if (result.stderr) appendOutput(result.stderr, 'stderr');
                    if (result.stdout || result.stderr)
                        appendOutput('exit: ' + result.exitCode, 'info');
                } else {
                    appendOutput('错误: ' + (result.error || '执行失败'), 'error');
                }
            } catch (e) {
                appendOutput('网络错误: ' + e.message, 'error');
            } finally {
                running = false;
                btnExec.disabled = false;
                btnExec.textContent = '执行';
                input.focus();
            }
        }

        input.addEventListener('keydown', function(e) {
            if (e.isComposing) return;
            if (e.key === 'Enter') {
                execCmd();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    input.value = history[historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx < history.length - 1) {
                    historyIdx++;
                    input.value = history[historyIdx];
                } else {
                    historyIdx = history.length;
                    input.value = '';
                }
            }
        });

        window.addEventListener('resize', function() {
            if (mode === 'interactive' && ws) {
                wsSendResize();
            }
        });

        // Init
        fetch('/api/shell/cwd').then(function(r) { return r.json(); }).then(function(d) {
            if (d.cwd) updatePrompt(d.cwd);
        }).catch(function(){});

        tryConnectWS();
        input.focus();

        // ---- 工具栏固定/自动隐藏 ----
        const toolbar = document.getElementById('toolbar');
        const trigger = document.getElementById('toolbar-trigger');
        const pinBtn = document.getElementById('btn-pin');
        let toolbarTimer = null;
        let toolbarPinned = true;
        pinBtn.classList.add('pinned');

        function showToolbar() {
            clearTimeout(toolbarTimer);
            toolbar.classList.remove('hidden');
        }
        function hideToolbar() {
            if (!toolbarPinned)
                toolbarTimer = setTimeout(function() { toolbar.classList.add('hidden'); }, 600);
        }
        function togglePin() {
            toolbarPinned = !toolbarPinned;
            pinBtn.classList.toggle('pinned', toolbarPinned);
            pinBtn.title = toolbarPinned ? '固定工具栏' : '取消固定';
            if (toolbarPinned) {
                clearTimeout(toolbarTimer);
                toolbar.classList.remove('hidden');
            }
        }

        pinBtn.addEventListener('click', togglePin);
        trigger.addEventListener('mouseenter', showToolbar);
        toolbar.addEventListener('mouseenter', function() { clearTimeout(toolbarTimer); });
        toolbar.addEventListener('mouseleave', hideToolbar);
    </script>
</body>
</html>
